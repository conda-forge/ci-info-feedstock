schema_version: 1

context:
  name: ci-info
  version: 0.3.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 1fd50cbd401f29adffeeb18b0489e232d16ac1a7458ac6bc316deab6ae535fb0

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - ci_info
        - ci_info.tests
      python_version: ${{ python_min }}.*
about:
  license: MIT
  license_file: LICENSE
  summary: Get details about the current Continuous Integration environment.
  # doc_url:
  homepage: https://github.com/mgxd/ci-info
  repository: https://github.com/mgxd/ci-info

extra:
  recipe-maintainers:
    - mgxd
    - satra
    - effigies
