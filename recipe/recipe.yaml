schema_version: 1

context:
  name: ci-info
  version: "0.4.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 34d5a18726b3780abdf985234b871ac33124d64dd8e294870b8cc5b410c18418

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - ci_info
        - ci_info.tests
      python_version: ${{ python_min }}.*
about:
  license: MIT
  license_file: LICENSE
  summary: Get details about the current Continuous Integration environment.
  # doc_url:
  homepage: https://github.com/mgxd/ci-info
  repository: https://github.com/mgxd/ci-info

extra:
  recipe-maintainers:
    - mgxd
    - satra
    - effigies
